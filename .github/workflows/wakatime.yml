name: Waka Readme

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SHOW_LINES: true
          SHOW_LANGUAGE: true
          SHOW_PROJECTS: true
          SHOW_TIME: true
          SHOW_EDITORS: true
          SHOW_OS: true
          SHOW_METADATA: true
          COMMIT_MESSAGE: "Update WakaTime stats"
